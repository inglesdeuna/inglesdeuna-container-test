<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <!-- Jack — Pirate kid -->
  <circle cx="26" cy="26" r="26" fill="#F5F3FF"/>
  <!-- Hat -->
  <ellipse cx="26" cy="14" rx="16" ry="5" fill="#1e1b4b"/>
  <rect x="12" y="6" width="28" height="10" rx="3" fill="#1e1b4b"/>
  <!-- Skull on hat -->
  <circle cx="26" cy="9" r="3.5" fill="white"/>
  <circle cx="24.5" cy="8.5" r=".8" fill="#1e1b4b"/>
  <circle cx="27.5" cy="8.5" r=".8" fill="#1e1b4b"/>
  <path d="M24 11 Q26 12.5 28 11" stroke="#1e1b4b" stroke-width=".8" fill="none"/>
  <!-- Head -->
  <circle cx="26" cy="27" r="12" fill="#FCDDBF"/>
  <!-- Eyepatch -->
  <ellipse cx="22" cy="25" rx="4" ry="3" fill="#1e1b4b"/>
  <line x1="18" y1="23" x2="26" y2="22" stroke="#1e1b4b" stroke-width="1.2"/>
  <!-- Eye -->
  <circle cx="30" cy="25" r="1.8" fill="#534AB7"/>
  <!-- Scar -->
  <path d="M29 22 L31 28" stroke="#C2580A" stroke-width="1" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M22 30 Q26 34 30 30" stroke="#C2580A" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <!-- Tooth -->
  <rect x="25" y="30" width="3" height="2.5" rx=".5" fill="white"/>
  <!-- Bandana -->
  <path d="M14 19 Q26 22 38 19 L38 23 Q26 26 14 23 Z" fill="#F97316"/>
  <!-- Body -->
  <rect x="16" y="38" width="20" height="12" rx="5" fill="#534AB7"/>
  <!-- Belt -->
  <rect x="16" y="40" width="20" height="3" fill="#C2580A"/>
  <rect x="24" y="39.5" width="4" height="4" rx="1" fill="#F97316"/>
</svg>
