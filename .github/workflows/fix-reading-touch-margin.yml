name: Fix reading comprehension margins

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update reading spacing and zoom overflow
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lessons/lessons/activities/reading_comprehension/viewer.php')
          text = path.read_text(encoding='utf-8')

          old_passage = "  .rc-passage { overflow-y: auto; padding: 20px; background: #fff; border-right: 1px solid #F0EEF8; line-height: 1.75; }"
          new_passage = "  .rc-passage { overflow: auto; padding: 28px 32px 32px; background: #fff; border-right: 1px solid #F0EEF8; line-height: 1.75; box-sizing: border-box; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }"
          if old_passage not in text:
              raise SystemExit('Expected .rc-passage rule was not found')
          text = text.replace(old_passage, new_passage, 1)

          old_media = "  @media (max-width: 850px) { .rc-grid-2, .rc-grid-3, .rc-player { grid-template-columns: 1fr; } .rc-savebar { grid-template-columns: 1fr; } }"
          new_media = "  @media (max-width: 850px) { .rc-grid-2, .rc-grid-3, .rc-player { grid-template-columns: 1fr; } .rc-savebar { grid-template-columns: 1fr; } .rc-passage { padding: 24px 22px 30px; border-right: 0; border-bottom: 1px solid #F0EEF8; } }\n  @media (max-width: 520px) { .rc-passage { padding: 20px 18px 26px; } }"
          if old_media not in text:
              raise SystemExit('Expected mobile media rule was not found')
          text = text.replace(old_media, new_media, 1)

          old_inner = "  .rc-passage-inner { display: block; }"
          new_inner = "  .rc-passage-inner { display: block; min-width: 100%; width: max-content; max-width: none; padding-right: 24px; box-sizing: border-box; transform-origin: top left; }"
          if old_inner not in text:
              raise SystemExit('Expected .rc-passage-inner rule was not found')
          text = text.replace(old_inner, new_inner, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lessons/lessons/activities/reading_comprehension/viewer.php
          git commit -m 'Fix reading comprehension margins at all zoom levels'
          git push
