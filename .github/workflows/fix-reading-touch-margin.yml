name: Fix reading comprehension touch margins

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-reading-touch-margin.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update responsive passage spacing and zoom overflow
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lessons/lessons/activities/reading_comprehension/viewer.php')
          text = path.read_text(encoding='utf-8')

          old = """  .rc-passage { overflow-y: auto; padding: 20px; background: #fff; border-right: 1px solid #F0EEF8; line-height: 1.75; }"""
          new = """  .rc-passage { overflow: auto; padding: 20px; background: #fff; border-right: 1px solid #F0EEF8; line-height: 1.75; box-sizing: border-box; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
  .rc-passage-inner { display: block; min-width: 0; max-width: 100%; margin: 0 auto; transform-origin: top left; }
  @media (hover: none), (pointer: coarse) {
    .rc-passage { padding: 24px 20px 28px; }
    .rc-passage-inner { min-width: 100%; }
  }
  @media (max-width: 850px) {
    .rc-passage { padding: 22px 18px 28px; border-right: 0; border-bottom: 1px solid #F0EEF8; }
  }
  @media (max-width: 520px) {
    .rc-passage { padding: 18px 16px 24px; }
  }"""

          if old not in text:
              raise SystemExit('Expected .rc-passage rule was not found')
          text = text.replace(old, new, 1)

          duplicate = """  .rc-passage-inner { display: block; }"""
          if duplicate not in text:
              raise SystemExit('Expected old .rc-passage-inner rule was not found')
          text = text.replace(duplicate, '', 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lessons/lessons/activities/reading_comprehension/viewer.php
          git commit -m 'Fix reading comprehension touch margins and zoom overflow'
          git push
